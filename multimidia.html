  <body>
    <div id="interface">

        <hgroup>

        <img id="icon" src="_imagens/multimidia.png" />

        <nav id="menu">

            <li

            <li

            <li>
              <a href="multimidia.html">multimedia</a>

            <li

            </li>
          </ul>

      <section id="body-full">

              <h1>Sounds and videos</h1>

            <video

              poster="_imagens/video-mini03.jpg"

              <source src="_media/getting-started.mp4" type="video/mp4" />
            </video>
          </div>
        </article>
      </section>

      <footer id="rodape">
        <p>
          <i>Copyright &copy; 2026 - by Enzo Fernandes</i><br />
